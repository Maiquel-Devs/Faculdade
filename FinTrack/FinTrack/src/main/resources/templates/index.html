<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>FinTrack - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
<div class="container my-5">
    <header class="text-center mb-5">
        <h1 class="display-4 text-primary fw-bold">FinTrack</h1>
        <p class="text-muted">Painel de Controle Financeiro Simplificado</p>
    </header>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card border-success shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 th:text="${novoAtivo.id != null} ? 'Editar Ativo' : 'Lançar Novo Ativo'"></h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/ativos/salvar}" th:object="${novoAtivo}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Nome do Ativo</label>
                            <input type="text" th:field="*{nome}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Valor (R$)</label>
                            <input type="number" step="0.01" th:field="*{valor}" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100"
                                th:text="${novoAtivo.id != null} ? 'Atualizar Ativo' : 'Adicionar Ativo'"></button>
                        <a th:if="${novoAtivo.id != null}" th:href="@{/}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card border-danger shadow-sm">
                <div class="card-header bg-danger text-white">
                    <h5 th:text="${novaDespesa.id != null} ? 'Editar Despesa' : 'Lançar Nova Despesa'"></h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/despesas/salvar}" th:object="${novaDespesa}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Descrição da Despesa</label>
                            <input type="text" th:field="*{descricao}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Valor (R$)</label>
                            <input type="number" step="0.01" th:field="*{valor}" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100"
                                th:text="${novaDespesa.id != null} ? 'Atualizar Despesa' : 'Adicionar Despesa'"></button>
                        <a th:if="${novaDespesa.id != null}" th:href="@{/}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-5 g-4">
        <div class="col-md-6">
            <h3 class="text-success border-bottom pb-2">Ativos</h3>
            <table class="table table-striped align-middle">
                <thead class="table-dark"><tr><th>Nome</th><th>Valor</th><th class="text-center">Ações</th></tr></thead>
                <tbody>
                <tr th:each="ativo : ${ativos}">
                    <td th:text="${ativo.nome}"></td>
                    <td th:text="'R$ ' + ${ativo.valor}"></td>
                    <td class="text-center">
                        <div class="btn-group">
                            <a th:href="@{/ativos/editar/{id}(id=${ativo.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                            <a th:href="@{/ativos/deletar/{id}(id=${ativo.id})}" class="btn btn-sm btn-outline-danger">Excluir</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="col-md-6">
            <h3 class="text-danger border-bottom pb-2">Despesas</h3>
            <table class="table table-striped align-middle">
                <thead class="table-dark"><tr><th>Descrição</th><th>Valor</th><th class="text-center">Ações</th></tr></thead>
                <tbody>
                <tr th:each="despesa : ${despesas}">
                    <td th:text="${despesa.descricao}"></td>
                    <td th:text="'R$ ' + ${despesa.valor}"></td>
                    <td class="text-center">
                        <div class="btn-group">
                            <a th:href="@{/despesas/editar/{id}(id=${despesa.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                            <a th:href="@{/despesas/deletar/{id}(id=${despesa.id})}" class="btn btn-sm btn-outline-danger">Excluir</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card mt-5 shadow-sm">
        <div class="card-header bg-dark text-white text-center"><h5>Gráfico Comparativo de Balanço</h5></div>
        <div class="card-body d-flex justify-content-center">
            <div style="width: 50%;">
                <canvas id="graficoBarras"></canvas>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const totalAtivos = [[${totalAtivos}]];
    const totalDespesas = [[${totalDespesas}]];

    const ctx = document.getElementById('graficoBarras').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Ativos', 'Despesas'],
            datasets: [{
                label: 'Balanço Acumulado (R$)',
                data: [totalAtivos, totalDespesas],
                backgroundColor: ['#198754', '#dc3545'],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: { y: { beginAtZero: true } }
        }
    });
</script>
</body>
</html>
