spring.application.name=Sistema_De_Cartao_Ponto_SpringBoot

# ConfigurańŃo do banco de dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/cartao_ponto_spring?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ConfigurańŃo do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Encoding
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4