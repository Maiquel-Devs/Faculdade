<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Criar Personagem de RPG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-secondary text-light p-4 shadow">
                <h2 class="text-center mb-4">Gerar Novo Personagem com IA</h2>
                <form th:action="@{/personagens/salvar}" th:object="${personagem}" method="post">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome do Personagem:</label>
                        <input type="text" id="nome" th:field="*{nome}" class="form-control bg-dark text-light border-0" placeholder="Ex: Arthas, Legolas..." required>
                    </div>
                    <div class="mb-3">
                        <label for="classe" class="form-label">Classe:</label>
                        <select id="classe" th:field="*{classe}" class="form-select bg-dark text-light border-0" required>
                            <option value="" disabled selected>Escolha uma classe...</option>
                            <option value="Guerreiro">Guerreiro</option>
                            <option value="Mago">Mago</option>
                            <option value="Arqueiro">Arqueiro</option>
                            <option value="Ladino">Ladino</option>
                            <option value="Paladino">Paladino</option>
                        </select>
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success btn-lg">Invocando Mistral AI...</button>
                        <a th:href="@{/personagens}" class="btn btn-outline-light btn-sm">Voltar para a Galeria</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
